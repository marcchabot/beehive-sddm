[General]

# ── Background ────────────────────────────────────────────────────────────
# Type: "image" | "gif" | "video"
# To switch to cyber_bee_monochrome: background=assets/cyber_bee_monochrome.png
background_type=image
background=assets/cyber_queen_nexus.png

# ── BeeAura Blur ──────────────────────────────────────────────────────────
# Value 0.0 (none) to 1.0 (maximum blur)
blur_radius=0.18

# ── Available modes comment ───────────────────────────────────────────────
# image  → Static PNG with slow breathing effect (scale 1.0↔1.05)
# gif    → Animated GIF (AnimatedImage, e.g.: backgrounds/bee_loop.gif)
# video  → MP4/WebM (MediaPlayer + VideoOutput, e.g.: backgrounds/bee_loop.mp4)
#
# Available backgrounds:
#   assets/hexa_neon_honey.png       — Hexa-Neon honey gold style
#   assets/cyber_bee_monochrome.png  — Cyber-Bee monochrome style
#   assets/hexa_neon_base.png        — neutral hex variant
#   assets/cyber_bee_base.png        — neutral cyber variant
