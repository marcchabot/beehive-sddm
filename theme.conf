[General]

# ── Fond d'écran ──────────────────────────────────────────────────────────
# Type : "image" | "gif" | "video"
# Pour passer à cyber_bee_monochrome : background=assets/cyber_bee_monochrome.png
background_type=image
background=assets/hexa_neon_honey.png

# ── Flou BeeAura ─────────────────────────────────────────────────────────
# Valeur 0.0 (aucun) à 1.0 (flou maximal)
blur_radius=0.45

# ── Commentaire sur les modes disponibles ────────────────────────────────
# image  → PNG statique avec respiration lente (scale 1.0↔1.05)
# gif    → GIF animé (AnimatedImage, ex: backgrounds/bee_loop.gif)
# video  → MP4/WebM (MediaPlayer + VideoOutput, ex: backgrounds/bee_loop.mp4)
#
# Backgrounds disponibles :
#   assets/hexa_neon_honey.png       — style Hexa-Neon doré miel
#   assets/cyber_bee_monochrome.png  — style Cyber-Bee monochrome
#   assets/hexa_neon_base.png        — variante hexa neutre
#   assets/cyber_bee_base.png        — variante cyber neutre
